name: chat-app-dev

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - path: .env
        required: true
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    env_file:
      - path: .env
        required: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -ec "pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm --filter @chat/client exec quasar prepare --silent &&
      pnpm --filter @chat/server dev"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile.dev
    env_file:
      - path: .env
        required: true
    environment:
      DOCKER: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    depends_on:
      server:
        condition: service_started
    command: >
      sh -ec "while [ ! -f node_modules/.modules.yaml ]; do sleep 1; done &&
      pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm --filter @chat/client exec quasar prepare --silent &&
      pnpm --filter @chat/client dev"

volumes:
  postgres_data_dev:
  dev_node_modules:
