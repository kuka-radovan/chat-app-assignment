name: chat-app-prod

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - path: .env
        required: true
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - path: .env
        required: true
    environment:
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:${PROXY_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    env_file:
      - path: .env
        required: true
    ports:
      - "${PROXY_PORT}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
